    <h1 class="article-title" itemprop="name">
      企业会议简单要求
    </h1>
  

      </header>
    
    <div class="article-entry" itemprop="articleBody">
      
        <h2 id="会议原则："><a href="#会议原则：" class="headerlink" title="会议原则："></a>会议原则：</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">* 能不开会就不开会，根据开会目的与目标来确定</span><br><span class="line">* 分清自己的角色，做好会前准备和会议引导</span><br></pre></td></tr></table></figure>
<h2 id="会议过程："><a href="#会议过程：" class="headerlink" title="会议过程："></a>会议过程：</h2><h4 id="1-会前准备"><a href="#1-会前准备" class="headerlink" title="1. 会前准备"></a>1. 会前准备</h4><ul>
<li>会议召集人会前准备工作: </li>
</ul>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">* why：开会是否能解决问题，是否需要开会</span><br><span class="line">    * 需要多人（n&gt;2）一起解决的问题</span><br><span class="line">    * 邮件无法描述清楚</span><br><span class="line">    * 比较紧急需要决定的事情</span><br><span class="line">    * 需要更多人当面沟通效果更好的事情</span><br></pre></td></tr></table></figure>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">* who：需要谁参加</span><br><span class="line">    * 不知道谁参加时：请求经理、技术指导人</span><br><span class="line">    * 控制不超过8人：参加会议的人必须是能够对会议目标作出贡献的人</span><br><span class="line">    * 设计会议程序，部分人可以晚来或者先走</span><br><span class="line">    * 将大部分会议分成几个小的会议</span><br><span class="line">    * 对于部分与会者，可提前征求意见，减少不必要的参与</span><br></pre></td></tr></table></figure>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">* time：需要开多久</span><br><span class="line">    * 鼓励快速的短会</span><br><span class="line">    * 会议时间1小时以内</span><br><span class="line">    * 如果会议有延长的可能性，考虑安排在11点或者17点</span><br></pre></td></tr></table></figure>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">* when&amp;where：会议开始时间&amp;地点，并发出会议通知</span><br><span class="line">    * 描述清楚目标、希望解决的问题</span><br><span class="line">    * 时间、地点、参与人列表</span><br><span class="line">    * 参与人需要做的准备工作</span><br><span class="line">    * 预计持续时间</span><br></pre></td></tr></table></figure>
<ul>
<li>会议参与人会前准备：</li>
</ul>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">* why：是否需要参加</span><br><span class="line">* when：会议时自己的时间安排是否合适</span><br></pre></td></tr></table></figure>
<h4 id="2-会议引导"><a href="#2-会议引导" class="headerlink" title="2. 会议引导"></a>2. 会议引导</h4><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">* 召集人：将自己看作服务者</span><br><span class="line">* 预先对议题有一个整体研究（过去、现状、预期）</span><br><span class="line">* 能够聆听他人发言，给予意见不同者一定的反对时间，鼓励发言者进一步阐明观点或留以后研究</span><br><span class="line">* 纠正误解和不相关的话题</span><br><span class="line">* 有下列情况应立即结束讨论</span><br><span class="line">    * 意见已经达成一致</span><br><span class="line">    * 进一步讨论的资料缺乏</span><br><span class="line">    * 讨论所需的人没有参加会议</span><br><span class="line">    * 成员认为需要时间考虑或者下来商量</span><br><span class="line">    * 讨论说明原有议题的假设已经发生改变</span><br><span class="line">    * 本次会议太长，没有时间更好的讨论该议题</span><br><span class="line">    * 有反对意见，达成一致较困难</span><br><span class="line">    * 结束议题后应该总结一下</span><br></pre></td></tr></table></figure>
<h4 id="3-会议总结"><a href="#3-会议总结" class="headerlink" title="3. 会议总结"></a>3. 会议总结</h4><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">* 会议之后进行会议总结</span><br><span class="line">* 如果需要，向参会人发出会议总结邮件</span><br></pre></td></tr></table></figure>
